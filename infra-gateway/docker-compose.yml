# NEXUS | infra-gateway/docker-compose.yml
# Person B: "The Bridge" Engineer
#
# PURPOSE:
#   Orchestrates the complete NEXUS infrastructure in a single file.
#   Supports two deployment profiles:
#     - "onprem"  → Runs inside the client's firewall. Only the vault + sync sidecar.
#     - "cloud"   → Runs in NEXUS cloud. Kafka, Zookeeper, and the cloud ingestor API.
#
# USAGE:
#   On-Prem deployment (run inside client's network):
#     docker-compose --profile onprem up -d
#
#   Cloud deployment (run on NEXUS managed cloud):
#     docker-compose --profile cloud up -d
#
#   Full local dev (run everything):
#     docker-compose --profile onprem --profile cloud up -d


# ─── Shared Networks ──────────────────────────────────────────────────────────
networks:
  nexus_internal:           # Used by on-prem components. Isolated from internet.
    driver: bridge
    internal: true          # No external internet access from this network
  nexus_cloud:              # Used by cloud components. Has internet access.
    driver: bridge

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  vault_data:               # Persistent SQLite DB for on-prem vault
    driver: local
  kafka_data:               # Kafka broker data
    driver: local
  zookeeper_data:           # Zookeeper state
    driver: local
  ai_brain_data:            # AI Brain telemetry SQLite
    driver: local
  clickhouse_data:
    driver: local

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── ON-PREM PROFILE ────────────────────────────────────────────────────────

  # The On-Prem Vault Aggregator
  # Reads raw events from local SQLite, aggregates them into InsightPackets.
  nexus-vault-aggregator:
    profiles: ["onprem"]
    build:
      context: ./on_prem_vault
      dockerfile: Dockerfile.aggregator
    container_name: nexus_vault_aggregator
    restart: unless-stopped
    environment:
      NEXUS_DB_PATH: /vault/nexus_vault.db
      NEXUS_AGG_INTERVAL: "300"             # Aggregate every 5 minutes
      NEXUS_CPU_LIMIT: "2.0"               # Circuit breaker: halt if host CPU > 2%
    volumes:
      - vault_data:/vault                  # Persistent DB shared with sync service
      - /etc/nexus/certs:/certs:ro         # TLS certs mounted from host
    networks:
      - nexus_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/vault/nexus_vault.db').execute('SELECT 1')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.10"                     # Hard CPU cap: this sidecar must not impact the host app
          memory: 128M

  # The On-Prem Sync Service
  # Reads InsightPackets from SQLite and pushes to Cloud Ingestor via mTLS.
  nexus-vault-sync:
    profiles: ["onprem"]
    build:
      context: ./on_prem_vault
      dockerfile: Dockerfile.sync
    container_name: nexus_vault_sync
    restart: unless-stopped
    environment:
      NEXUS_DB_PATH: /vault/nexus_vault.db
      NEXUS_CLOUD_URL: ${NEXUS_CLOUD_INGESTOR_URL:-https://ingestor.nexus-cloud.internal/api/v1/ingest}
      NEXUS_SYNC_INTERVAL: "60"
      NEXUS_SYNC_BATCH: "20"
      NEXUS_API_KEY: ${NEXUS_API_KEY}      # Injected from .env file at client site
    volumes:
      - vault_data:/vault                  # Shared volume — reads from same DB as aggregator
      - /etc/nexus/certs:/certs:ro
    networks:
      - nexus_cloud                        # Egress to cloud ingestor (internal-only would block sync)
    depends_on:
      - nexus-vault-aggregator

  # Browser / SDK → raw_events (same SQLite volume as aggregator). Host port for LAN browsers.
  nexus-vault-gateway:
    profiles: ["onprem"]
    build:
      context: ./on_prem_vault
      dockerfile: Dockerfile.gateway
    container_name: nexus_vault_gateway
    restart: unless-stopped
    environment:
      NEXUS_DB_PATH: /vault/nexus_vault.db
      NEXUS_API_KEY: ${NEXUS_API_KEY:-}
      # Reach AI Brain on the host (default host port 8787 — see nexus-ai-brain ports).
      NEXUS_MIRROR_TO_CLOUD: ${NEXUS_MIRROR_TO_CLOUD:-http://host.docker.internal:8787}
    volumes:
      - vault_data:/vault
    ports:
      - "8091:8090"
    networks:
      - nexus_cloud
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 64M

  # ── CLOUD PROFILE ──────────────────────────────────────────────────────────

  # ClickHouse — analytics warehouse (Kafka / consumer sink)
  clickhouse:
    profiles: ["cloud"]
    image: clickhouse/clickhouse-server:24.8
    container_name: nexus_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: nexus
      CLICKHOUSE_USER: nexus
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nexus}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - nexus_cloud
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Apache Zookeeper (Kafka dependency)
  zookeeper:
    profiles: ["cloud"]
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexus_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - nexus_cloud
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s 

  # Apache Kafka Broker
  kafka:
    profiles: ["cloud"]
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexus_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # Topics are created by kafka_config.py, not auto-created
      KAFKA_LOG_RETENTION_MS: 604800000         # 7-day retention
      KAFKA_MESSAGE_MAX_BYTES: 10485760         # 10MB max message size (for InsightPacket batches)
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"                           # Exposed for local dev only
    networks:
      - nexus_cloud
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # NEXUS Cloud Ingestor API (FastAPI)
  nexus-cloud-ingestor:
    profiles: ["cloud"]
    build:
      context: ./cloud_ingestor
      dockerfile: Dockerfile.ingestor
    container_name: nexus_cloud_ingestor
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NEXUS_KAFKA_BROKERS: ${NEXUS_KAFKA_BROKERS:-kafka:9092}
      NEXUS_API_KEY: ${NEXUS_API_KEY}
      NEXUS_KAFKA_REPLICATION: "1"
      AIVEN_SSL_CAFILE: ${AIVEN_SSL_CAFILE:-}
      AIVEN_SSL_CERTFILE: ${AIVEN_SSL_CERTFILE:-}
      AIVEN_SSL_KEYFILE: ${AIVEN_SSL_KEYFILE:-}
    volumes:
      - ./cloud_ingestor/certs:/certs:ro   # mount local certs, ignored by git
    ports:
      - "8080:8080"
    networks:
      - nexus_cloud
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: uvicorn kafka_config:app --host 0.0.0.0 --port 8080 --workers 4

  # ── DEV TOOLS (no profile — always available in dev) ─────────────────────

  # NEXUS AI Brain — FastAPI: telemetry, analytics, governance, pipeline
  nexus-ai-brain:
    profiles: ["cloud", "dev"]
    build:
      context: ../ai-brain
      dockerfile: Dockerfile
    container_name: nexus_ai_brain
    restart: unless-stopped
    environment:
      NEXUS_API_KEY: ${NEXUS_API_KEY:-dev-secret-key-replace-in-prod}
      NEXUS_TELEMETRY_DB: /data/telemetry.db
      NEXUS_CLOUD_INGEST_URL: ${NEXUS_CLOUD_INGEST_URL:-http://nexus-cloud-ingestor:8080/api/v1/events}
      NEXUS_KAFKA_CONSUME: ${NEXUS_KAFKA_CONSUME:-true}
      NEXUS_KAFKA_BROKERS: ${NEXUS_KAFKA_BROKERS:-kafka:9092}
      NEXUS_KAFKA_TOPIC_PATTERN: ${NEXUS_KAFKA_TOPIC_PATTERN:-^nexus\\.events\\..+}
      NEXUS_RBAC_ENFORCE: ${NEXUS_RBAC_ENFORCE:-false}
      # When SQLite has no rows, clone bundled demo events for the requested tenant (analytics + RAG). Set false in prod.
      NEXUS_DEMO_FALLBACK: ${NEXUS_DEMO_FALLBACK:-true}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-nexus}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-nexus}
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    volumes:
      - ai_brain_data:/data
      - ../ai-brain:/app:cached
    # Default 8787: many dev stacks use :8000 for something else; you still get 404/ wrong JSON at /.
    # Override with NEXUS_AI_BRAIN_HOST_PORT=8000 in infra-gateway/.env if you prefer.
    ports:
      - "${NEXUS_AI_BRAIN_HOST_PORT:-8787}:8000"
    networks:
      - nexus_cloud
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 8s
      retries: 3

  # Kafka UI for local debugging — see topics, messages, consumer groups
  kafka-ui:
    profiles: ["cloud"]
    image: provectuslabs/kafka-ui:latest
    container_name: nexus_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: nexus-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "9090:8080"
    networks:
      - nexus_cloud

  # Apache Flink (optional) — submit SQL/Table jobs to consume nexus Kafka topics; profile "flink".
  flink-jobmanager:
    profiles: ["flink"]
    image: flink:1.18-scala_2.12-java17
    container_name: nexus_flink_jobmanager
    hostname: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    networks:
      - nexus_cloud

  flink-taskmanager:
    profiles: ["flink"]
    image: flink:1.18-scala_2.12-java17
    container_name: nexus_flink_taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    networks:
      - nexus_cloud